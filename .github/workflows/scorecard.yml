name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '24 6 * * 1'
  push:
    branches: [main]

# Read-only by default; the analysis job elevates only what it needs.
# defends: token-scope abuse via a compromised action
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for the OIDC token Scorecard uses to read branch protection.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # OpenSSF Scorecard probes deps.dev / OSV / OSS-Fuzz / BestPractices
          # and uploads SARIF. Allowlist derived from a real audit run.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            api.deps.dev:443
            api.osv.dev:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            www.bestpractices.dev:443

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # defends: credential persistence in .git/config reused by later steps
          persist-credentials: false

      - name: Run analysis
        # pin verified vs v2.4.0 release
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # MUST stay false on a fork: the OpenSSF webapp rejects fork
          # publishing (HTTP 400, "Fork repository: true") and the action
          # then exits non-zero, failing this workflow. The score badge is
          # therefore structurally unavailable while this repo is a fork —
          # only achievable if it becomes a non-fork/standalone repo.
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          sarif_file: results.sarif
