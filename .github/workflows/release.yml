  #   name: Publish to PyPI (OIDC Trusted Publisher)
  #   needs: [build, provenance, sbom]
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write   # OIDC token for the Trusted Publisher exchange
  #   steps:
  #     - name: Harden runner
  #       uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
  #       with:
  #         egress-policy: block
  #         allowed-endpoints: >
  #           github.com:443
  #           api.github.com:443
  #           release-assets.githubusercontent.com:443
  #           results-receiver.actions.githubusercontent.com:443
  #           *.blob.core.windows.net:443
  #           upload.pypi.org:443
  #           pypi.org:443
  #     - name: Download dist
  #       uses: actions/download-artifact@<PIN-WHEN-ENABLING> # v4
  #       with:
  #         name: dist
  #         path: dist/
  #     - name: Publish
  #       uses: pypa/gh-action-pypi-publish@<PIN-WHEN-ENABLING> # release/v1
  #       # No username/password and no API token: OIDC Trusted Publisher only.
