name: Release

# DORMANT: this workflow only ever runs on a pushed version tag (v*).
# It has no push-to-branch, pull_request, or workflow_dispatch trigger, so
# it cannot run on the open PR or on main — it is inert until a tag ships.
on:
  push:
    tags:
      - 'v*'

# Read-only at the top level; the provenance job alone elevates its scope.
# defends: token-scope abuse via a compromised action
permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # base64-encoded sha256 subjects of every dist/* artifact, consumed by
      # the SLSA generator to bind provenance to the exact bytes we built.
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # Build job: checkout + setup-python + hashed pip install + build +
          # upload-artifact. DORMANT workflow (tag-only) — allowlist reasoned
          # from step network ops, not a live audit run; see SSCS-USER-ACTIONS.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # defends: credential persistence in .git/config reused by later steps
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      # Hashed install of the build backend before building. --require-hashes
      # makes a tampered hatchling/build wheel fail closed.
      # defends: tampered build-backend wheel substitution
      - name: Install build backend (hashed closure)
        run: |
          set -euo pipefail
          # No unpinned `pip install --upgrade pip` (Scorecard
          # Pinned-Dependencies): runner pip from the SHA-pinned
          # actions/setup-python already supports --require-hashes.
          pip install --require-hashes -r requirements.lock

      - name: Build sdist + wheel
        run: |
          set -euo pipefail
          python -m build --sdist --wheel --no-isolation
          ls -l dist/

      - name: Generate subject hashes
        id: hash
        run: |
          set -euo pipefail
          cd dist
          # base64(sha256sum dist/*) — single-line, no wrapping.
          # `-- *` so a dist filename starting with '-' is not parsed as a flag.
          echo "hashes=$(sha256sum -- * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  provenance:
    name: SLSA3 provenance
    needs: [build]
    # SLSA L3 verifies the reusable-workflow ref identity, so this is pinned
    # to the @v2.1.0 TAG, not a SHA — SHA-pinning breaks SLSA provenance.
    # zizmor's unpinned-uses cannot model this constraint; narrow, documented,
    # evidence-based ignore (the slsa-github-generator REQUIRES a tag ref —
    # this is the one sanctioned exception, not a blanket suppression).
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true

  sbom:
    name: CycloneDX SBOM
    # needs provenance too: the SLSA generator creates the GitHub Release
    # (upload-assets: true); the SBOM is attached to that existing release.
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: block
          # SBOM job: + gh release upload (uploads.github.com). DORMANT
          # workflow — allowlist reasoned, not live-audited; see
          # SSCS-USER-ACTIONS.md.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          # Matches the Python requirements-citools.lock was compiled on
          # (--require-hashes is Python-version sensitive — see ci.yml sca job).
          python-version: "3.13"

      # Install the runtime closure so the environment SBOM reflects exactly
      # what ships, then generate a CycloneDX SBOM from that environment.
      # defends: opaque dependency graph (post-incident response cannot
      # answer "are we affected?" without an SBOM)
      - name: Generate SBOM
        run: |
          set -euo pipefail
          pip install --require-hashes -r requirements.lock
          pip install -e . --no-deps --no-build-isolation
          # Hash-pinned CI-tool install (Scorecard Pinned-Dependencies).
          pip install --require-hashes -r requirements-citools.lock
          cyclonedx-py environment -o sbom.cdx.json
          test -s sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
          if-no-files-found: error

      # Attach via the built-in gh CLI + GITHUB_TOKEN — no third-party action
      # (every added Action is attack surface; this exercise minimizes it).
      # defends: supply-chain risk from an unaudited release-upload action
      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" sbom.cdx.json --clobber

  # ---------------------------------------------------------------------------
  # PyPI publish — ENABLE only after configuring a PyPI Trusted Publisher
  # (OIDC) — see SSCS-USER-ACTIONS.md. Until then this job stays fully
  # commented out so no long-lived PyPI token is ever required.
  # ---------------------------------------------------------------------------
